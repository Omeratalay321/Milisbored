<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Milis'i Doyur</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; }
        
        /* Yol Tasarımı */
        #yol { 
            position: absolute; bottom: 0; width: 100%; height: 150px; 
            background: #555; border-top: 10px solid #444; 
        }

        /* Milis Karakteri */
        #milis { 
            position: absolute; bottom: 60px; left: 50px; 
            font-size: 60px; transition: transform 0.1s linear; 
            z-index: 100;
        }

        /* Bored (Yiyecekler) */
        .bored { 
            position: absolute; font-size: 40px; 
            bottom: 70px; z-index: 50;
        }

        /* Arayüz */
        #skor { 
            position: fixed; top: 20px; left: 20px; 
            background: rgba(255,255,255,0.8); padding: 10px;
            border-radius: 10px; font-size: 24px; font-weight: bold; 
        }

        #mesaj { 
            position: fixed; top: 40%; left: 50%; 
            transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 20px;
            font-size: 35px; font-weight: bold; color: #d32f2f;
            display: none; text-align: center; border: 5px solid #d32f2f;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="skor">Toplanan Bored: 0 / 20</div>
    <div id="mesaj">Aferin milisi iyice doyurdun şişti!</div>
    <div id="yol"></div>

    <div id="milis">🐱</div>

    <script>
        const milis = document.getElementById('milis');
        const skorYazisi = document.getElementById('skor');
        const mesaj = document.getElementById('mesaj');

        let toplanan = 0;
        let milisX = 50;
        let bittiMi = false;

        // Hareket: Sağ ve Sol ok tuşları
        window.addEventListener('keydown', (e) => {
            if(bittiMi) return;
            if (e.key === "ArrowRight") milisX += 30;
            if (e.key === "ArrowLeft") milisX -= 30;
            
            // Ekran sınırlarını koru
            if(milisX < 0) milisX = 0;
            if(milisX > window.innerWidth - 60) milisX = window.innerWidth - 60;
            
            milis.style.left = milisX + "px";
            kontrolEt();
        });

        // Rastgele Bored (Yiyecek) oluşturma
        function boredOlustur() {
            if(bittiMi) return;
            const bored = document.createElement('div');
            bored.className = 'bored';
            bored.innerText = '🍔';
            bored.style.left = (Math.random() * (window.innerWidth - 60)) + "px";
            document.body.appendChild(bored);
            
            // 4 saniye sonra toplanmazsa silinsin
            setTimeout(() => { if(bored.parentNode) bored.remove(); }, 4000);
        }

        // Dokunma/Çarpışma kontrolü
        function kontrolEt() {
            const boredlar = document.querySelectorAll('.bored');
            boredlar.forEach(b => {
                const bRect = b.getBoundingClientRect();
                const mRect = milis.getBoundingClientRect();

                // Basit çarpışma testi
                if (!(bRect.right < mRect.left || bRect.left > mRect.right)) {
                    b.remove();
                    toplanan++;
                    skorYazisi.innerText = `Toplanan Bored: ${toplanan} / 20`;
                    
                    // Milis büyüsün (şişsin)
                    let olcek = 1 + (toplanan * 0.15);
                    milis.style.transform = `scale(${olcek})`;

                    if (toplanan >= 20) {
                        bittiMi = true;
                        mesaj.style.display = "block";
                    }
                }
            });
        }

        // Her 1.2 saniyede bir yeni yiyecek gelsin
        setInterval(boredOlustur, 1200);
    </script>
</body>
</html>
