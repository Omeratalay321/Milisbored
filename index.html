<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milis'i Doyur</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        
        /* Yol */
        #yol { 
            position: absolute; bottom: 0; width: 100%; height: 25%; 
            background: #555; border-top: 5px solid #444; 
        }

        /* Milis */
        #milis { 
            position: absolute; bottom: 15%; left: 50%; 
            font-size: 80px; transform: translateX(-50%);
            transition: left 0.2s ease-out, transform 0.2s;
            z-index: 100;
        }

        /* Bored */
        .bored { 
            position: absolute; font-size: 50px; 
            bottom: 18%; z-index: 50;
        }

        /* Göstergeler */
        #skor { 
            position: fixed; top: 10px; left: 10px; 
            background: white; padding: 8px; border-radius: 8px;
            font-size: 20px; font-weight: bold; z-index: 200;
        }

        #mesaj { 
            position: fixed; top: 30%; left: 50%; width: 80%;
            transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 15px;
            font-size: 25px; font-weight: bold; color: #d32f2f;
            display: none; text-align: center; border: 4px solid #d32f2f;
            z-index: 1000;
        }

        /* Mobil Kontrol Alanları */
        .kontrol {
            position: fixed; top: 0; width: 50%; height: 100%; z-index: 150;
        }
        #sol { left: 0; }
        #sag { right: 0; }
    </style>
</head>
<body>

    <div id="skor">Bored: 0 / 20</div>
    <div id="mesaj">Aferin milisi iyice doyurdun şişti!</div>
    <div id="yol"></div>
    <div id="milis">🐱</div>

    <!-- Dokunmatik Alanlar -->
    <div id="sol" class="kontrol"></div>
    <div id="sag" class="kontrol"></div>

    <script>
        const milis = document.getElementById('milis');
        const skorYazisi = document.getElementById('skor');
        const mesaj = document.getElementById('mesaj');

        let toplanan = 0;
        let milisX = window.innerWidth / 2;
        let bittiMi = false;

        // Hareket Fonksiyonu
        function hareketEt(yon) {
            if(bittiMi) return;
            if(yon === 'sol') milisX -= 40;
            if(yon === 'sag') milisX += 40;

            // Sınırlar
            if(milisX < 40) milisX = 40;
            if(milisX > window.innerWidth - 40) milisX = window.innerWidth - 40;

            milis.style.left = milisX + "px";
            kontrolEt();
        }

        // Dokunmatik Kontroller
        document.getElementById('sol').addEventListener('touchstart', (e) => { e.preventDefault(); hareketEt('sol'); });
        document.getElementById('sag').addEventListener('touchstart', (e) => { e.preventDefault(); hareketEt('sag'); });
        
        // Bilgisayar için de tıklama desteği
        document.getElementById('sol').addEventListener('mousedown', () => hareketEt('sol'));
        document.getElementById('sag').addEventListener('mousedown', () => hareketEt('sag'));

        function boredOlustur() {
            if(bittiMi) return;
            const bored = document.createElement('div');
            bored.className = 'bored';
            bored.innerText = '🍔';
            bored.style.left = (Math.random() * (window.innerWidth - 60)) + "px";
            document.body.appendChild(bored);
            setTimeout(() => { if(bored.parentNode) bored.remove(); }, 3000);
        }

        function kontrolEt() {
            const boredlar = document.querySelectorAll('.bored');
            boredlar.forEach(b => {
                const bRect = b.getBoundingClientRect();
                const mRect = milis.getBoundingClientRect();

                if (!(bRect.right < mRect.left || bRect.left > mRect.right)) {
                    b.remove();
                    toplanan++;
                    skorYazisi.innerText = `Bored: ${toplanan} / 20`;
                    
                    let olcek = 1 + (toplanan * 0.1);
                    milis.style.transform = `translateX(-50%) scale(${olcek})`;

                    if (toplanan >= 20) {
                        bittiMi = true;
                        mesaj.style.display = "block";
                    }
                }
            });
        }

        setInterval(boredOlustur, 1000);
    </script>
</body>
</html>
